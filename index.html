<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stock Manager</title>
  <meta name="application-name" content="Stock Manager" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-title" content="Stock Manager" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  
  <!-- Anti-Cache Meta Tags -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="preconnect" href="https://cdn.tailwindcss.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://script.google.com" />

  <link rel="icon" type="image/png" sizes="192x192" href="https://i.postimg.cc/zDFxrHNZ/image.png?v=20260502" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/zDFxrHNZ/image.png?v=20260502" />
  <link rel="mainfest" href="mainfest.json" />

  <!-- Tailwind 3 CDN - Load but with deferred performance -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=4.0.10" />
</head>

<body class="bg-slate-50">

  <header id="main-header"
    class="sticky top-0 z-40 bg-white/95 backdrop-blur-xl border-b border-slate-200/60 transition-all duration-300">

    <!-- ชั้นที่ 1: Logo + Search + Refresh -->
    <div id="header-top" class="flex items-center gap-3 px-4 py-3 transition-all duration-300">
      <div
        class="w-10 h-10 bg-brand-600 rounded-2xl flex items-center justify-center shadow-lg shadow-brand-600/20 flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
        </svg>
      </div>
      <div class="relative flex-1 min-w-0">
        <div class="absolute inset-y-0 left-3.5 flex items-center pointer-events-none text-slate-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <input id="search-input" type="search" placeholder="ค้นหาสินค้า หรือบาร์โค้ด..."
          oninput="onSearch(); toggleClearBtn(this.value)"
          class="w-full px-4 py-2.5 pl-10 pr-10 rounded-2xl border border-slate-200 bg-slate-50/50 text-sm transition-all duration-200 outline-none focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10" />
        <button id="clearSearchBtn" onclick="clearSearch()"
          class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-rose-500 p-1 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div class="header-action-group">
        <button type="button" onclick="openScannerModal()" aria-label="สแกนบาร์โค้ด"
          class="header-action-btn bg-brand-50 text-brand-600 active:scale-90 transition-transform">
          <svg class="header-action-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <g transform="translate(0.25 0.25)">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4.75 8V5.75A1.75 1.75 0 0 1 6.5 4h2.25M19.25 8V5.75A1.75 1.75 0 0 0 17.5 4h-2.25M4.75 16v2.25A1.75 1.75 0 0 0 6.5 20h2.25M19.25 16v2.25A1.75 1.75 0 0 1 17.5 20h-2.25M9.5 10.25v3.5M12 9.5v5M14.5 10.25v3.5" />
            </g>
          </svg>
        </button>
        <button type="button" onclick="loadAllData()" aria-label="รีเฟรช"
          class="header-action-btn bg-brand-50 text-brand-600 active:scale-90 transition-transform">
          <svg class="header-action-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
        </button>
      </div>
    </div>

    <!-- ชั้นที่ 2: Tabs -->
    <div id="tabs-scroll" class="flex gap-2 px-4 pb-2.5 overflow-x-auto no-scrollbar">
      <button id="tab-update"
        class="tab-btn tab-priority tab-aging active px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 whitespace-nowrap active:scale-95"
        onclick="switchTab('Aging',this)">Update</button>
      <button id="tab-overview"
        class="tab-btn tab-priority tab-products px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 whitespace-nowrap active:scale-95"
        onclick="switchTab('__OVERVIEW__',this)">รายการสินค้า</button>
    </div>

    <!-- ชั้นที่ 3: Subtabs -->
    <div id="subtabs-container"
      class="flex px-4 pb-2.5 border-t border-slate-100 pt-2.5 flex-col sm:flex-row gap-2 sm:items-center justify-between">
      <div class="flex gap-1.5 overflow-x-auto no-scrollbar">
        <button
          class="subtab-btn active px-3 py-1.5 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-500 active:scale-95 transition-all whitespace-nowrap"
          data-subtab="All"
          onclick="switchSubTab('All',this)">All</button>
        <button
          class="subtab-btn px-3 py-1.5 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-500 active:scale-95 transition-all flex items-center gap-1 whitespace-nowrap"
          data-subtab="Favorite"
          onclick="switchSubTab('Favorite',this)">
          <svg class="w-3 h-3" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 3h14a1 1 0 0 1 1 1v17l-7-3.5L6 21V4a1 1 0 0 1 1-1z" />
          </svg>Favorite
        </button>
        <button
          class="subtab-btn subtab-os-btn px-3 py-1.5 rounded-lg text-[11px] font-bold bg-slate-100 text-rose-600 active:scale-95 transition-all flex items-center gap-1 whitespace-nowrap"
          data-subtab="OS"
          onclick="switchSubTab('OS',this)">
          <span class="inline-flex h-2 w-2 rounded-full bg-rose-600"></span>OS
        </button>
        <div id="sheet-subtabs" class="flex gap-1.5"></div>
      </div>
      <div class="flex gap-1.5 shrink-0">
        <button
          class="px-3 py-1.5 rounded-lg text-[11px] font-bold bg-brand-50 text-brand-600 active:scale-95 transition-all flex items-center gap-1 border border-brand-100 shadow-sm whitespace-nowrap"
          onclick="openAddProductModal()">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
          </svg>
          เพิ่มสินค้า
        </button>
        <button id="reorder-btn"
          class="px-3 py-1.5 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-500 active:scale-95 transition-all flex items-center gap-1 border border-slate-200 shadow-sm whitespace-nowrap"
          onclick="toggleReorderMode()">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
          </svg>
          จัดลำดับ
        </button>
      </div>
    </div>
  </header>

  <main id="scroll-container" class="flex-1 overflow-y-auto overscroll-none">
    <div id="ptr-bar"
      class="h-0 overflow-hidden flex items-center justify-center bg-slate-50 transition-all duration-300">
      <div class="w-5 h-5 border-2 border-brand-200 border-t-brand-600 rounded-full animate-spin"></div>
    </div>
    <div class="px-4 py-4 pb-32">
      <div class="mb-3 flex items-center justify-between">
        <span id="stats-text"
          class="text-[10px] font-black text-slate-500 tracking-widest uppercase">กำลังโหลดข้อมูล...</span>
        <span class="text-[8px] font-bold text-slate-400 uppercase">Version 4.0.10-Hybrid</span>
      </div>
      <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-slate-900"></div>
      <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-center">
        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4 text-slate-300">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <p class="text-slate-400 font-bold text-sm">ไม่พบสินค้าที่คุณค้นหา</p>
      </div>
    </div>
  </main>

  <!-- ไฟล์ Modal และ Script - Deferred -->
  <script src="modals.js?v=4.0.10" defer></script>
  <script src="scripts.js?v=4.0.10" defer></script>

</body>

</html>
